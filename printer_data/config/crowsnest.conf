#### crowsnest.conf
#### This is a typical default config.
#### Also used as default in mainsail / MainsailOS
#### See:
#### https://github.com/mainsail-crew/crowsnest/blob/master/README.md
#### for details to configure to your needs.


#####################################################################
####                                                            #####
####      Information about ports and according URL's           #####
####                                                            #####
#####################################################################
####                                                            #####
####    Port 8080 equals /webcam/?action=[stream/snapshot]      #####
####    Port 8081 equals /webcam2/?action=[stream/snapshot]     #####
####    Port 8082 equals /webcam3/?action=[stream/snapshot]     #####
####    Port 8083 equals /webcam4/?action=[stream/snapshot]     #####
####                                                            #####
####    Note: These ports are default for most Mainsail         #####
####    installations. To use any other port would involve      #####
####    changing the proxy configuration or using directly      #####
####    http://<ip>:<port>/?action=[stream/snapshot]            #####
####                                                            #####
#####################################################################
####    RTSP Stream URL: ( if enabled and supported )           #####
####    rtsp://<ip>:<rtsp_port>/stream.h264                     #####
#####################################################################


[crowsnest]
log_path: /home/biqu/printer_data/logs/crowsnest.log
log_level: verbose
delete_log: false
no_proxy: false

[cam 1]
mode: ustreamer
enable_rtsp: false
rtsp_port: 8554
port: 8080
device: /dev/v4l/by-id/usb-Vimicro_corp._PC-LM1E_Camera_PC-LM1E_Audio-video-index0
resolution: 640x480          # Zmieniono z 1280x720
max_fps: 7                   # Zmniejszono z 10
custom_flags: --format=mjpeg # Bardzo ważne dla odciążenia CPU
v4l2ctl: brightness=0,contrast=20,saturation=10,hue=0,power_line_frequency=2,sharpness=8,exposure_auto=3

[cam 2]
mode: ustreamer
enable_rtsp: false
rtsp_port: 8555              # Zmieniono z 8554 (unikalny port)
port: 8081
device: /dev/v4l/by-id/usb-PC-LM1E_PC-LM1E_PC-LM1E-video-index0
resolution: 640x480          # Zmieniono z 1280x720
max_fps: 7                   # Zmniejszono z 10
custom_flags: --format=mjpeg # Bardzo ważne dla odciążenia CPU
v4l2ctl: brightness=0,contrast=20,saturation=10,hue=0,power_line_frequency=2,sharpness=8,exposure_auto=3


[gcode_shell_command crowsnest_stop]
command: systemctl stop crowsnest
timeout: 2.
verbose: True

[gcode_shell_command crowsnest_start]
command: systemctl start crowsnest
timeout: 2.
verbose: True
